name: Keep Supabase Alive

on:
  schedule:
    # Tous les 3 jours à minuit
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase via l'API REST
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/vehicules?limit=1")
          
          echo "Code HTTP reçu : $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Erreur lors du ping de Supabase."
            exit 1
          fi
          
          echo "Ping réussi, projet maintenu actif."